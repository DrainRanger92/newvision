steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          -t $LOCATION-docker.pkg.dev/$PROJECT_ID/newvision/backend:$COMMIT_SHA \
          -t $LOCATION-docker.pkg.dev/$PROJECT_ID/newvision/backend:latest \
          .

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker push $LOCATION-docker.pkg.dev/$PROJECT_ID/newvision/backend --all-tags

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy newvision-backend \
          --image=$LOCATION-docker.pkg.dev/$PROJECT_ID/newvision/backend:$COMMIT_SHA \
          --region=$LOCATION \
          --platform=managed \
          --port=8000 \
          --timeout=300s \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --concurrency=80 \
          --set-env-vars=BOT_ENABLED=false \
          --allow-unauthenticated \
          --quiet

images:
  - '$LOCATION-docker.pkg.dev/$PROJECT_ID/newvision/backend:$COMMIT_SHA'
