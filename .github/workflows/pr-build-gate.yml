name: PR Build Gate

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  # ── Python validation: imports + lint + tests ──────────────────────
  validate-python:
    name: Python (imports / lint / tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-validate
      - name: Report commit status success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/statuses/${{ github.sha }} --field state=success --field context="validate-python" --field description="Python validation passed"
      - name: Report commit status failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/statuses/${{ github.sha }} --field state=failure --field context="validate-python" --field description="Python validation failed"

  # ── Frontend validation: npm ci + npm run build ────────────────────
  validate-frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/frontend-build
      - name: Report commit status success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/statuses/${{ github.sha }} --field state=success --field context="validate-frontend" --field description="Frontend build passed"
      - name: Report commit status failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/statuses/${{ github.sha }} --field state=failure --field context="validate-frontend" --field description="Frontend build failed"
