name: validate-cloudbuild

on:
  pull_request:
    paths:
      - 'cloudbuild.yaml'
      - 'backend/Dockerfile'
      - '.dockerignore'
      - '.github/scripts/validate-cloudbuild.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate cloudbuild.yaml + Dockerfile
        run: python3 .github/scripts/validate-cloudbuild.py
