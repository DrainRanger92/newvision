name: 'Frontend Build'
description: 'Build frontend with npm (PR Build Gate)'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: cd frontend && npm ci
      shell: bash

    - name: G-frontend-build — Build frontend
      run: cd frontend && npm run build
      shell: bash
